<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBloom • IE/UK Smart Budgeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">🌸</div>
                <div>
                    <span class="text-2xl font-bold tracking-tight">BudgetBloom</span>
                    <span class="text-xs text-emerald-600 block -mt-1">IE • UK</span>
                </div>
            </div>
            
            <div class="flex items-center gap-x-4">
                <button onclick="showLoginModal()" class="px-6 py-2.5 text-sm font-semibold border rounded-2xl hover:bg-gray-100">Log in</button>
                <button onclick="showAuthModal()" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl text-sm font-semibold">Sign Up Free</button>
            </div>
        </div>
    </nav>

    <!-- Sign Up Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-md w-full mx-4 p-10">
            <h3 class="text-3xl font-semibold text-center mb-8">Create your free account</h3>
            <input id="signup-email" type="email" placeholder="Email address" class="w-full px-6 py-5 rounded-2xl border mb-4">
            <input id="signup-password" type="password" placeholder="Password" class="w-full px-6 py-5 rounded-2xl border mb-8">
            <button onclick="signUpWithSupabase()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl font-semibold text-lg">Sign Up</button>
            <div onclick="hideAuthModal()" class="text-center text-sm text-gray-500 mt-8 cursor-pointer">Close</div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-md w-full mx-4 p-10">
            <h3 class="text-3xl font-semibold text-center mb-8">Log in</h3>
            <input id="login-email" type="email" placeholder="Email address" class="w-full px-6 py-5 rounded-2xl border mb-4">
            <input id="login-password" type="password" placeholder="Password" class="w-full px-6 py-5 rounded-2xl border mb-8">
            <button onclick="loginWithSupabase()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl font-semibold text-lg">Log In</button>
            <div onclick="hideLoginModal()" class="text-center text-sm text-gray-500 mt-8 cursor-pointer">Close</div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const supabaseUrl = 'https://zvhrdpywdhgwjhdlpgcm.supabase.co';
        const supabaseKey = 'sb_publishable_L7kclCWf_IqRxC374yMZRw_ecWliK3I';
        const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

        async function signUpWithSupabase() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            
            if (!email || !password) return alert("Please fill all fields");

            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) alert("Error: " + error.message);
            else {
                alert("✅ Check your email for the confirmation link!");
                hideAuthModal();
            }
        }

        async function loginWithSupabase() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) return alert("Please fill all fields");

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Error: " + error.message);
            else {
                alert("✅ Logged in successfully! Welcome back.");
                hideLoginModal();
            }
        }

        function showAuthModal() {
            document.getElementById('auth-modal').classList.remove('hidden');
        }
        function hideAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
        }

        function showLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
        }
        function hideLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
