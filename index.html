<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBloom • IE/UK Smart Budgeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #10b981 0%, #4f46e5 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">🌸</div>
                <div>
                    <span class="text-2xl font-bold tracking-tight">BudgetBloom</span>
                    <span class="text-xs text-emerald-600 block -mt-1">IE • UK</span>
                </div>
            </div>
            
            <div class="flex items-center gap-x-4">
                <button onclick="showLoginModal()" class="px-6 py-2.5 text-sm font-semibold border rounded-2xl hover:bg-gray-100">Log in</button>
                <button onclick="showAuthModal()" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl text-sm font-semibold">Sign Up Free</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero-bg text-white py-24">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-7xl font-bold tracking-tighter leading-none mb-6">
                Budget better.<br>Live brighter.
            </h1>
            <p class="max-w-lg mx-auto text-xl text-white/90 mb-10">
                Smart budgeting with Irish &amp; UK tax rules, personalized plans, and tools to break overspending cycles.
            </p>
            <button onclick="showAuthModal()" class="px-10 py-4 bg-white text-emerald-700 rounded-3xl text-lg font-semibold hover:scale-105 transition-all">
                Start Free – No card needed
            </button>
        </div>
    </div>

    <!-- Sign Up Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-md w-full mx-4 p-10">
            <h3 class="text-3xl font-semibold text-center mb-8">Create your free account</h3>
            <input id="signup-email" type="email" placeholder="Email address" class="w-full px-6 py-5 rounded-2xl border mb-4">
            <input id="signup-password" type="password" placeholder="Password" class="w-full px-6 py-5 rounded-2xl border mb-8">
            <button onclick="signup()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl font-semibold text-lg">Sign Up – It's Free</button>
            <div onclick="hideAuthModal()" class="text-center text-sm text-gray-500 mt-8 cursor-pointer">Close</div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-md w-full mx-4 p-10">
            <h3 class="text-3xl font-semibold text-center mb-8">Log in to your account</h3>
            <input id="login-email" type="email" placeholder="Email address" class="w-full px-6 py-5 rounded-2xl border mb-4">
            <input id="login-password" type="password" placeholder="Password" class="w-full px-6 py-5 rounded-2xl border mb-8">
            <button onclick="login()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl font-semibold text-lg">Log In</button>
            <div onclick="hideLoginModal()" class="text-center text-sm text-gray-500 mt-8 cursor-pointer">Close</div>
        </div>
    </div>

    <script>
        function showAuthModal() {
            document.getElementById('auth-modal').classList.remove('hidden');
        }
        function hideAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
        }

        function showLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
        }
        function hideLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
        }

        function signup() {
            const email = document.getElementById('signup-email').value;
            if (email) {
                alert("✅ Account created successfully!\nWelcome to BudgetBloom!");
                hideAuthModal();
            } else {
                alert("Please enter your email");
            }
        }

        function login() {
            const email = document.getElementById('login-email').value;
            if (email) {
                alert("✅ Logged in successfully!\nWelcome back!");
                hideLoginModal();
            } else {
                alert("Please enter your email");
            }
        }
    </script>
</body>
</html>
