<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBloom • IE/UK Smart Budgeting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #10b981 0%, #4f46e5 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Navbar -->
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">🌸</div>
                <div>
                    <span class="text-2xl font-bold tracking-tight">BudgetBloom</span>
                    <span class="text-xs text-emerald-600 block -mt-1">IE • UK</span>
                </div>
            </div>
            <button onclick="showSignup()" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl text-sm font-semibold transition-colors">
                Sign Up Free
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero-bg text-white py-24">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-7xl font-bold tracking-tighter leading-none mb-6">
                Budget better.<br>Live brighter.
            </h1>
            <p class="max-w-lg mx-auto text-xl text-white/90 mb-10">
                Smart budgeting with Irish &amp; UK tax rules, personalized plans, and tools to break overspending cycles.
            </p>
            <button onclick="showSignup()" class="px-10 py-4 bg-white text-emerald-700 rounded-3xl text-lg font-semibold hover:scale-105 transition-all">
                Start Free – No card needed
            </button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-4xl font-semibold mb-8">Good afternoon, Alex 👋</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="bg-white rounded-3xl p-6">Spent: €2,184</div>
            <div class="bg-white rounded-3xl p-6">Remaining: €1,666</div>
            <div class="bg-white rounded-3xl p-6">Tax Est: €612</div>
            <div class="bg-white rounded-3xl p-6 text-rose-500">Overspend Alert</div>
        </div>
    </div>

    <!-- Sign Up Modal -->
    <div id="signup-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-10 max-w-md w-full mx-4">
            <h3 class="text-3xl font-semibold text-center mb-8">Create your free account</h3>
            
            <input id="email" type="email" placeholder="Email address" class="w-full px-6 py-5 rounded-2xl border mb-4">
            <input id="password" type="password" placeholder="Password" class="w-full px-6 py-5 rounded-2xl border mb-8">
            
            <button onclick="signup()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl font-semibold text-lg">
                Sign Up – It's Free
            </button>
            
            <div onclick="hideSignup()" class="text-center text-sm text-gray-500 mt-6 cursor-pointer hover:underline">Close</div>
        </div>
    </div>

    <script>
        function showSignup() {
            document.getElementById('signup-modal').classList.remove('hidden');
        }
        
        function hideSignup() {
            document.getElementById('signup-modal').classList.add('hidden');
        }
        
        function signup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert("✅ Account created! Welcome to BudgetBloom, " + email.split('@')[0] + "!");
                hideSignup();
            } else {
                alert("Please enter your email");
            }
        }
    </script>
</body>
</html>
