<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetBloom • IE/UK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🌸</span>
                <span class="font-bold text-2xl">BudgetBloom</span>
            </div>
            <button onclick="showSignup()" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-semibold">Sign Up Free</button>
        </div>
    </nav>

    <!-- Hero -->
    <div class="bg-gradient-to-br from-emerald-500 to-indigo-600 text-white py-24 text-center">
        <h1 class="text-6xl font-bold">Budget better.<br>Live brighter.</h1>
    </div>

    <!-- Sign Up Modal -->
    <div id="signup-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-10 max-w-md w-full mx-4">
            <h2 class="text-3xl font-bold text-center mb-8">Create your free account</h2>
            
            <input id="email" type="email" placeholder="Email address" class="w-full px-6 py-5 border rounded-2xl mb-4">
            <input id="password" type="password" placeholder="Password" class="w-full px-6 py-5 border rounded-2xl mb-6">
            
            <button onclick="signup()" class="w-full py-5 bg-emerald-600 text-white rounded-3xl font-semibold text-lg mb-4">
                Sign Up – It's Free
            </button>
            
            <p class="text-center text-sm text-gray-500">By signing up you agree to our Terms</p>
            
            <button onclick="hideSignup()" class="mt-6 w-full text-gray-500">Close</button>
        </div>
    </div>

    <script>
        function showSignup() {
            document.getElementById('signup-modal').classList.remove('hidden');
        }

        function hideSignup() {
            document.getElementById('signup-modal').classList.add('hidden');
        }

        function signup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert("✅ Account created successfully! (Demo)\n\nWelcome to BudgetBloom, " + email.split('@')[0] + "!");
                hideSignup();
            } else {
                alert("Please enter your email");
            }
        }
    </script>
</body>
</html>
